<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Bradshaw Ping"/>
  <title>Bradshaw Ping</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f3ef;
      --surface: #fdfcfb;
      --border: #e8e4de;
      --text: #1c1a17;
      --muted: #9a9186;
      --sage: #b8c9b0;
      --sage-light: #e8efe6;
      --stone: #c4b8a8;
      --stone-light: #f0ece6;
      --accent: #7a9e8e;
      --green: #6ba88a;
      --red: #c07070;
      --shadow: 0 2px 16px rgba(0,0,0,0.06);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 20px 60px;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
      animation: fadeUp 0.6s ease both;
    }

    .family-initial {
      width: 56px;
      height: 56px;
      background: var(--sage);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      color: white;
      margin: 0 auto 16px;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.75rem;
      font-weight: 400;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .tagline {
      color: var(--muted);
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.04em;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
      animation: fadeUp 0.6s ease both;
    }

    .card-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .name-input-row {
      display: flex;
      gap: 10px;
    }

    input[type="text"] {
      flex: 1;
      padding: 13px 16px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]::placeholder { color: var(--muted); }
    input[type="text"]:focus { border-color: var(--sage); }

    .btn-primary {
      padding: 13px 20px;
      background: var(--sage);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-primary:hover { background: var(--accent); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 20px;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--stone);
      flex-shrink: 0;
      transition: all 0.3s;
    }
    .dot.ok { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot.err { background: var(--red); }

    .presets {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }

    .preset-btn {
      padding: 16px 12px;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
      line-height: 1.4;
    }
    .preset-btn:hover {
      border-color: var(--sage);
      background: var(--sage-light);
      transform: translateY(-1px);
      box-shadow: 0 3px 10px rgba(184,201,176,0.25);
    }
    .preset-btn:active { transform: translateY(0); }
    .preset-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    .preset-btn .emoji { font-size: 1.4rem; display: block; margin-bottom: 5px; }
    .preset-btn .label { font-size: 12px; color: var(--muted); }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider span {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .custom-row { display: flex; gap: 10px; }

    .log-entries {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 160px;
      overflow-y: auto;
    }
    .log-entry {
      font-size: 12px;
      color: var(--muted);
      padding: 8px 12px;
      background: var(--bg);
      border-radius: 8px;
      border-left: 2px solid var(--border);
      animation: fadeIn 0.3s ease;
    }
    .log-entry.ok { border-color: var(--green); color: var(--green); }
    .log-entry.err { border-color: var(--red); color: var(--red); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(3px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #pingCard, #logCard { display: none; }
  </style>
</head>
<body>

<header>
  <div class="family-initial">B</div>
  <h1>Bradshaw Ping</h1>
  <p class="tagline">Family updates, instantly</p>
</header>

<div class="card" id="setupCard">
  <div class="card-title">Who's checking in?</div>
  <div class="name-input-row">
    <input type="text" id="nameInput" placeholder="Your name..." maxlength="20"/>
    <button class="btn-primary" id="joinBtn">Join</button>
  </div>
</div>

<div class="card" id="pingCard">
  <div class="card-title">Send a ping</div>
  <div class="status-bar">
    <div class="dot" id="dot"></div>
    <span id="statusText">Connecting...</span>
  </div>
  <div class="presets">
    <button class="preset-btn" data-msg="Arrived safely ✅" disabled>
      <span class="emoji">✅</span>
      <span class="label">Arrived safely</span>
    </button>
    <button class="preset-btn" data-msg="Come eat! 🍽️" disabled>
      <span class="emoji">🍽️</span>
      <span class="label">Come eat</span>
    </button>
    <button class="preset-btn" data-msg="On my way 🚗" disabled>
      <span class="emoji">🚗</span>
      <span class="label">On my way</span>
    </button>
    <button class="preset-btn" data-msg="Come home 🏠" disabled>
      <span class="emoji">🏠</span>
      <span class="label">Come home</span>
    </button>
  </div>
  <div class="divider"><span>or</span></div>
  <div class="custom-row">
    <input type="text" id="customMsg" placeholder="Write a message..." maxlength="80" disabled/>
    <button class="btn-primary" id="sendCustomBtn" disabled>Send</button>
  </div>
</div>

<div class="card" id="logCard">
  <div class="card-title">Activity</div>
  <div class="log-entries" id="logEntries">
    <div class="log-entry">No activity yet...</div>
  </div>
</div>

<script>
  const VAPID_PUBLIC_KEY = "BCcJlsk3-RbjZc64P2gQ8ICSrbO4WehcvX3QLXWCKzc_WFos4N9AVhHd2zJ4kcSBC7Smpo3dhbWdRi23SZb2si4";

  let myName = localStorage.getItem("bradshawPingName") || "";
  let subscription = null;

  const setupCard = document.getElementById("setupCard");
  const pingCard = document.getElementById("pingCard");
  const logCard = document.getElementById("logCard");
  const nameInput = document.getElementById("nameInput");
  const joinBtn = document.getElementById("joinBtn");
  const dot = document.getElementById("dot");
  const statusText = document.getElementById("statusText");
  const logEntries = document.getElementById("logEntries");
  const customMsg = document.getElementById("customMsg");
  const sendCustomBtn = document.getElementById("sendCustomBtn");
  const presetBtns = document.querySelectorAll(".preset-btn");

  function log(msg, type = "") {
    const el = document.createElement("div");
    el.className = "log-entry" + (type ? " " + type : "");
    el.textContent = `${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} — ${msg}`;
    if (logEntries.children[0]?.textContent === "No activity yet...") logEntries.innerHTML = "";
    logEntries.prepend(el);
    if (logEntries.children.length > 10) logEntries.lastChild.remove();
  }

  function setStatus(text, state = "") {
    statusText.textContent = text;
    dot.className = "dot" + (state ? " " + state : "");
  }

  function enableControls() {
    presetBtns.forEach(b => b.disabled = false);
    customMsg.disabled = false;
    sendCustomBtn.disabled = false;
  }

  function urlBase64ToUint8Array(base64String) {
    const padding = "=".repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
    const rawData = atob(base64);
    return new Uint8Array([...rawData].map(c => c.charCodeAt(0)));
  }

  async function setup(name) {
    myName = name;
    localStorage.setItem("bradshawPingName", name);
    setupCard.style.display = "none";
    pingCard.style.display = "block";
    logCard.style.display = "block";
    setStatus("Requesting permission...");

    if (!("serviceWorker" in navigator) || !("PushManager" in window)) {
      setStatus("Not supported in this browser", "err");
      log("Push not supported in this browser", "err");
      return;
    }

    try {
      const reg = await navigator.serviceWorker.register("/sw.js");
      const permission = await Notification.requestPermission();
      if (permission !== "granted") {
        setStatus("Permission denied", "err");
        log("Notification permission denied", "err");
        return;
      }

      setStatus("Connecting...");
      subscription = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
      });

      const res = await fetch("/.netlify/functions/subscribe", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, subscription }),
      });

      const data = await res.json();
      if (data.success) {
        setStatus(`Ready — ${name}`, "ok");
        log(`Joined as ${name}`, "ok");
        enableControls();
      } else {
        setStatus("Failed to connect", "err");
        log("Error: " + data.error, "err");
      }
    } catch (err) {
      setStatus("Error: " + err.message, "err");
      log(err.message, "err");
    }
  }

  async function sendPing(message) {
    presetBtns.forEach(b => b.disabled = true);
    sendCustomBtn.disabled = true;
    log(`Sending: "${message}"`);

    try {
      const res = await fetch("/.netlify/functions/ping", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ senderName: myName, message }),
      });
      const data = await res.json();
      if (data.success) {
        log(`Sent to ${data.sent} ${data.sent === 1 ? "person" : "people"}!`, "ok");
      } else {
        log("Error: " + (data.error || "unknown"), "err");
      }
    } catch (err) {
      log("Error: " + err.message, "err");
    } finally {
      enableControls();
      customMsg.value = "";
    }
  }

  joinBtn.addEventListener("click", () => {
    const name = nameInput.value.trim();
    if (!name) return;
    setup(name);
  });
  nameInput.addEventListener("keydown", e => { if (e.key === "Enter") joinBtn.click(); });
  presetBtns.forEach(btn => btn.addEventListener("click", () => sendPing(btn.dataset.msg)));
  sendCustomBtn.addEventListener("click", () => {
    const msg = customMsg.value.trim();
    if (!msg) return;
    sendPing(msg);
  });
  customMsg.addEventListener("keydown", e => { if (e.key === "Enter") sendCustomBtn.click(); });

  if (myName) { nameInput.value = myName; setup(myName); }
</script>
</body>
</html>
